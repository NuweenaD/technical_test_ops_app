services:
  db:
    container_name: sales_kpi_db
    image: postgres:16-alpine
    ports:
      - "5442:5432"
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    container_name: sales_kpi_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql://sales:sales@db:5432/sales
      - DEV=1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    container_name: sales_kpi_web
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8010
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
